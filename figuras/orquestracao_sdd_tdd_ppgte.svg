<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="specGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b3a"/>
      <stop offset="100%" stop-color="#1a0f24"/>
    </linearGradient>
    <linearGradient id="testGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3320"/>
      <stop offset="100%" stop-color="#0d1a10"/>
    </linearGradient>
    <linearGradient id="resultGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#332a1a"/>
      <stop offset="100%" stop-color="#1a150d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1100" height="750" fill="url(#bg)"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" fill="#58a6ff" font-size="22" font-weight="bold">Orquestração SDD+TDD — Anteprojeto PPGTE/UFC 2026</text>
  <line x1="100" y1="55" x2="1000" y2="55" stroke="#30363d" stroke-width="1"/>

  <!-- ====== LAYER 1: SPECS (top) ====== -->
  <rect x="30" y="70" width="1040" height="135" rx="10" fill="url(#specGrad)" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="50" y="93" fill="#58a6ff" font-size="14" font-weight="bold">CAMADA 1 — SPEC (Fonte da Verdade)</text>

  <!-- Spec files -->
  <rect x="50" y="105" width="145" height="42" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="122" y="123" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="bold">PRD.md</text>
  <text x="122" y="138" text-anchor="middle" fill="#8b949e" font-size="9">Visão do Produto</text>

  <rect x="210" y="105" width="145" height="42" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="282" y="123" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="bold">RULES.md</text>
  <text x="282" y="138" text-anchor="middle" fill="#8b949e" font-size="9">Regras Invariantes</text>

  <rect x="370" y="105" width="145" height="42" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="442" y="123" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="bold">ARCHITECTURE.md</text>
  <text x="442" y="138" text-anchor="middle" fill="#8b949e" font-size="9">Decisões + ADRs</text>

  <rect x="530" y="105" width="145" height="42" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="602" y="123" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="bold">API_SPEC.md</text>
  <text x="602" y="138" text-anchor="middle" fill="#8b949e" font-size="9">Contratos</text>

  <rect x="690" y="105" width="145" height="42" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="762" y="123" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="bold">TESTS_SPEC.md</text>
  <text x="762" y="138" text-anchor="middle" fill="#8b949e" font-size="9">Validações</text>

  <rect x="850" y="105" width="145" height="42" rx="6" fill="#0d1117" stroke="#f0883e" stroke-width="1.5"/>
  <text x="922" y="123" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="bold">AGENTS.md</text>
  <text x="922" y="138" text-anchor="middle" fill="#d29922" font-size="9">Regras dos Agentes</text>

  <!-- Spec layer description -->
  <text x="550" y="172" text-anchor="middle" fill="#8b949e" font-size="11" font-style="italic">A spec é o ativo durável. O código (e o texto) é artefato transitório. Cada arquivo tem responsabilidade única.</text>
  <line x1="320" y1="177" x2="460" y2="177" stroke="#30363d"/>
  <line x1="640" y1="177" x2="780" y2="177" stroke="#30363d"/>

  <!-- ====== ARROWS L1 → L2 ====== -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3fb950"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#bc8cff"/>
    </marker>
  </defs>

  <line x1="250" y1="205" x2="250" y2="235" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="550" y1="205" x2="550" y2="235" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="850" y1="205" x2="850" y2="235" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>

