  <rect x="760" y="278" width="290" height="40" rx="6" fill="#da3633" opacity="0.25" stroke="#da3633"/>
  <text x="780" y="295" fill="#f85149" font-size="12" font-weight="bold">RED — Escrever testes que falham</text>
  <text x="780" y="311" fill="#8b949e" font-size="10">CT-001 (anonimato) → falha se nome presente</text>

  <!-- GREEN -->
  <rect x="760" y="328" width="290" height="40" rx="6" fill="#3fb950" opacity="0.15" stroke="#3fb950"/>
  <text x="780" y="345" fill="#3fb950" font-size="12" font-weight="bold">GREEN — Corrigir até todos passarem</text>
  <text x="780" y="361" fill="#8b949e" font-size="10">Remover marcas → CT-001 passa ✓</text>

  <!-- REFACTOR -->
  <rect x="760" y="378" width="290" height="40" rx="6" fill="#58a6ff" opacity="0.15" stroke="#58a6ff"/>
  <text x="780" y="395" fill="#58a6ff" font-size="12" font-weight="bold">REFACTOR — Limpar mantendo verde</text>
  <text x="780" y="411" fill="#8b949e" font-size="10">Melhorar fluência, eliminar repetições</text>

  <!-- Tools -->
  <rect x="760" y="430" width="138" height="14" rx="4" fill="#0d1117"/>
  <text x="830" y="440" text-anchor="middle" fill="#8b949e" font-size="8">pytest + pandoc + code-runner</text>

