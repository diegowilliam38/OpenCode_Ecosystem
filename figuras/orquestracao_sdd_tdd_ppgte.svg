  <rect x="30" y="240" width="680" height="210" rx="10" fill="url(#agentGrad)" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="50" y="263" fill="#bc8cff" font-size="14" font-weight="bold">CAMADA 2 — ORQUESTRAÇÃO DE AGENTES (Pipeline de 7 fases)</text>

  <!-- Agent sequence -->
  <rect x="50" y="278" width="145" height="55" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="122" y="296" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">① Product Agent</text>
  <text x="122" y="312" text-anchor="middle" fill="#8b949e" font-size="9">feature-forge</text>
  <text x="122" y="325" text-anchor="middle" fill="#8b949e" font-size="9">→ PRD.md</text>

  <rect x="210" y="278" width="145" height="55" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="282" y="296" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">② Domain Analyst</text>
  <text x="282" y="312" text-anchor="middle" fill="#8b949e" font-size="9">spec-driven-dev</text>
  <text x="282" y="325" text-anchor="middle" fill="#8b949e" font-size="9">→ RULES.md</text>

  <rect x="370" y="278" width="145" height="55" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="442" y="296" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">③ Architect</text>
  <text x="442" y="312" text-anchor="middle" fill="#8b949e" font-size="9">architecture-designer</text>
  <text x="442" y="325" text-anchor="middle" fill="#8b949e" font-size="9">→ ARCHITECTURE.md</text>

  <rect x="530" y="278" width="145" height="55" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="602" y="296" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">④ API Designer</text>
  <text x="602" y="312" text-anchor="middle" fill="#8b949e" font-size="9">api-designer</text>
  <text x="602" y="325" text-anchor="middle" fill="#8b949e" font-size="9">→ API_SPEC.md</text>

  <!-- Row 2 -->
  <rect x="50" y="348" width="145" height="55" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="122" y="366" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">⑤ Test Agent</text>
  <text x="122" y="382" text-anchor="middle" fill="#8b949e" font-size="9">test-driven-dev</text>
  <text x="122" y="395" text-anchor="middle" fill="#8b949e" font-size="9">→ TESTS_SPEC.md</text>

  <rect x="210" y="348" width="145" height="55" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="282" y="366" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">⑥ Implementation</text>
  <text x="282" y="382" text-anchor="middle" fill="#8b949e" font-size="9">coder-agent</text>
  <text x="282" y="395" text-anchor="middle" fill="#8b949e" font-size="9">→ texto/codigo</text>

  <rect x="370" y="348" width="145" height="55" rx="6" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="442" y="366" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">⑦ Reviewer</text>
  <text x="442" y="382" text-anchor="middle" fill="#8b949e" font-size="9">swarm-review</text>
  <text x="442" y="395" text-anchor="middle" fill="#8b949e" font-size="9">→ relatório</text>

  <!-- Additional agents below -->
  <rect x="530" y="348" width="145" height="28" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="602" y="367" text-anchor="middle" fill="#d29922" font-size="10">planning-and-task-breakdown</text>

  <rect x="530" y="382" width="145" height="28" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="602" y="401" text-anchor="middle" fill="#d29922" font-size="10">code-review-and-quality</text>

  <rect x="530" y="416" width="145" height="28" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="602" y="435" text-anchor="middle" fill="#d29922" font-size="10">the-fool (devil's advocate)</text>

  <!-- Agent layer note -->
  <text x="370" y="445" text-anchor="middle" fill="#8b949e" font-size="10" font-style="italic">Cada agente ≡ uma Agent Skill. A ordem é restrita: NUNCA começar pelo programador (⑥).</text>

