  <rect x="30" y="505" width="1040" height="235" rx="10" fill="url(#resultGrad)" stroke="#f0883e" stroke-width="1.5"/>
  <text x="50" y="528" fill="#f0883e" font-size="14" font-weight="bold">CAMADA 4 — RESULTADOS (Deliverables por Fase)</text>

  <!-- FASE 0 -->
  <rect x="50" y="545" width="230" height="85" rx="6" fill="#0d1117" stroke="#da3633" stroke-width="1.5"/>
  <text x="165" y="563" text-anchor="middle" fill="#f85149" font-size="12" font-weight="bold">FASE 0 — Submissão</text>
  <text x="165" y="580" text-anchor="middle" fill="#e6edf3" font-size="10">deadline: 01/06/2026</text>
  <text x="165" y="597" text-anchor="middle" fill="#8b949e" font-size="9">Anteprojeto PDF anônimo</text>
  <text x="165" y="612" text-anchor="middle" fill="#8b949e" font-size="9">Arquivo único ≤ 15MB</text>
  <text x="165" y="625" text-anchor="middle" fill="#8b949e" font-size="9">Inscrição SIGAA</text>

  <!-- FASE 1 -->
  <rect x="300" y="545" width="230" height="85" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="415" y="563" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">FASE 1 — Análise</text>
  <text x="415" y="580" text-anchor="middle" fill="#e6edf3" font-size="10">Meses 1-4</text>
  <text x="415" y="597" text-anchor="middle" fill="#8b949e" font-size="9">Mapeamento 125 agentes</text>
  <text x="415" y="612" text-anchor="middle" fill="#8b949e" font-size="9">Conformidade LGPD</text>
  <text x="415" y="625" text-anchor="middle" fill="#8b949e" font-size="9">Relatório técnico</text>

  <!-- FASE 2 -->
  <rect x="550" y="545" width="230" height="85" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="665" y="563" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="bold">FASE 2 — Guia</text>
  <text x="665" y="580" text-anchor="middle" fill="#e6edf3" font-size="10">Meses 5-12</text>
  <text x="665" y="597" text-anchor="middle" fill="#8b949e" font-size="9">4 módulos interativos</text>
  <text x="665" y="612" text-anchor="middle" fill="#8b949e" font-size="9">Validação especialistas</text>
  <text x="665" y="625" text-anchor="middle" fill="#8b949e" font-size="9">Produto educacional</text>

  <!-- FASE 3 -->
  <rect x="800" y="545" width="250" height="85" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="925" y="563" text-anchor="middle" fill="#d29922" font-size="12" font-weight="bold">FASE 3 — Estudo de Caso</text>
  <text x="925" y="580" text-anchor="middle" fill="#e6edf3" font-size="10">Meses 13-20</text>
  <text x="925" y="597" text-anchor="middle" fill="#8b949e" font-size="9">8-12 participantes</text>
  <text x="925" y="612" text-anchor="middle" fill="#8b949e" font-size="9">4 encontros grupo focal</text>
  <text x="925" y="625" text-anchor="middle" fill="#8b949e" font-size="9">Análise Bardin (2016)</text>

  <!-- FASE 4 -->
  <rect x="50" y="645" width="1000" height="45" rx="6" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="550" y="663" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">FASE 4 — Sistematização e Defesa (Meses 21-24): Dissertação ABNT + Slide deck + Produto educacional publicado</text>

  <!-- Legend -->
  <rect x="850" y="700" width="14" height="14" rx="3" fill="#0d1117" stroke="#f0883e"/>
  <text x="870" y="712" fill="#8b949e" font-size="10">Spec</text>
  <rect x="930" y="700" width="14" height="14" rx="3" fill="#0d1117" stroke="#bc8cff"/>
  <text x="950" y="712" fill="#8b949e" font-size="10">Agentes</text>
  <rect x="1010" y="700" width="14" height="14" rx="3" fill="#0d1117" stroke="#3fb950"/>
  <text x="1030" y="712" fill="#8b949e" font-size="10">Testes</text>
</svg>
