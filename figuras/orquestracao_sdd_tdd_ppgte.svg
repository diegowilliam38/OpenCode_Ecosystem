  <line x1="370" y1="450" x2="550" y2="500" stroke="#bc8cff" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="905" y1="450" x2="550" y2="500" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>

