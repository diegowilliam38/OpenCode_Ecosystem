<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <defs>
    <!-- Professional scientific palette -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFCFF"/>
      <stop offset="100%" stop-color="#F0F4F8"/>
    </linearGradient>
    <linearGradient id="triGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D6EAF8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#AED6F1" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="1.5" flood-color="#2C3E50" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowX" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5D6D7E"/>
    </marker>
    <marker id="arrowY" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5D6D7E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="560" fill="url(#bgGrad)" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="bold" fill="#1A252F">Figura 1: Conjunto S₄ — Geometria do Problema de Retas Ensolaradas</text>
  <line x1="200" y1="40" x2="600" y2="40" stroke="#3498DB" stroke-width="1.5" opacity="0.4"/>

  <!-- Grid area with coordinate system -->
  <g transform="translate(65,70)">
    <!-- Subtle background grid -->
    <g stroke="#E5E8E8" stroke-width="0.4" stroke-dasharray="3,5">
      <line x1="0" y1="80" x2="320" y2="80"/>
      <line x1="0" y1="160" x2="240" y2="160"/>
      <line x1="0" y1="240" x2="160" y2="240"/>
      <line x1="0" y1="320" x2="80" y2="320"/>
      <line x1="80" y1="0" x2="80" y2="320"/>
      <line x1="160" y1="0" x2="160" y2="240"/>
      <line x1="240" y1="0" x2="240" y2="160"/>
      <line x1="320" y1="0" x2="320" y2="80"/>
    </g>

    <!-- Coordinate axes -->
    <line x1="0" y1="0" x2="0" y2="400" stroke="#5D6D7E" stroke-width="1.6" marker-end="url(#arrowY)"/>
    <line x1="0" y1="0" x2="420" y2="0" stroke="#5D6D7E" stroke-width="1.6" marker-end="url(#arrowX)"/>
    <text x="435" y="6" font-family="Georgia,serif" font-size="14" font-style="italic" fill="#5D6D7E">x</text>
    <text x="-20" y="418" font-family="Georgia,serif" font-size="14" font-style="italic" fill="#5D6D7E">y</text>

    <!-- Tick marks -->
    <g font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#7F8C8D">
      <line x1="80" y1="-5" x2="80" y2="5" stroke="#ABB2B9" stroke-width="0.8"/>
      <text x="76" y="18">1</text>
      <line x1="160" y1="-5" x2="160" y2="5" stroke="#ABB2B9" stroke-width="0.8"/>
      <text x="156" y="18">2</text>
      <line x1="240" y1="-5" x2="240" y2="5" stroke="#ABB2B9" stroke-width="0.8"/>
      <text x="236" y="18">3</text>
      <line x1="320" y1="-5" x2="320" y2="5" stroke="#ABB2B9" stroke-width="0.8"/>
      <text x="316" y="18">4</text>
      <line x1="-5" y1="80" x2="5" y2="80" stroke="#ABB2B9" stroke-width="0.8"/>
      <text x="-20" y="84">1</text>
      <line x1="-5" y1="160" x2="5" y2="160" stroke="#ABB2B9" stroke-width="0.8"/>
      <text x="-20" y="164">2</text>
      <line x1="-5" y1="240" x2="5" y2="240" stroke="#ABB2B9" stroke-width="0.8"/>
      <text x="-20" y="244">3</text>
      <line x1="-5" y1="320" x2="5" y2="320" stroke="#ABB2B9" stroke-width="0.8"/>
      <text x="-20" y="324">4</text>
    </g>

    <!-- Triangle S_4: vertices (1,1), (4,1), (1,4) -> (80,320), (320,320), (80,80) -->
    <polygon points="80,320 320,320 80,80" fill="url(#triGrad)" stroke="#2980B9" stroke-width="2.2" stroke-linejoin="round"/>

    <!-- Anti-diagonals (x+y=c) — subtle reference lines -->
    <g stroke="#E74C3C" stroke-width="0.7" stroke-dasharray="6,5" opacity="0.45">
      <line x1="0" y1="400" x2="160" y2="240"/>  <!-- x+y=2 -->
      <line x1="0" y1="320" x2="240" y2="80"/>    <!-- x+y=3 -->
      <line x1="0" y1="240" x2="320" y2="0"/>     <!-- x+y=4 -->
      <line x1="0" y1="160" x2="400" y2="0"/>     <!-- x+y=5 -->
    </g>

    <!-- Non-sunny lines: horizontals y=1, y=2 -->
    <line x1="80" y1="320" x2="320" y2="320" stroke="#27AE60" stroke-width="2.4"/>
    <line x1="80" y1="160" x2="240" y2="160" stroke="#27AE60" stroke-width="2.4"/>

    <!-- Sunny line: through (1,3) with slope -2 -->
    <line x1="80" y1="240" x2="200" y2="0" stroke="#F39C12" stroke-width="2.2" stroke-dasharray="7,4"/>

    <!-- Points of S_4 -->
    <g>
      <!-- (1,1) --> <circle cx="80" cy="320" r="5.5" fill="#2C3E50" stroke="white" stroke-width="1.2"/><text x="90" y="324" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#2C3E50">(1,1)</text>
      <!-- (2,1) --> <circle cx="160" cy="320" r="5.5" fill="#2C3E50" stroke="white" stroke-width="1.2"/><text x="170" y="324" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#2C3E50">(2,1)</text>
      <!-- (3,1) --> <circle cx="240" cy="320" r="5.5" fill="#2C3E50" stroke="white" stroke-width="1.2"/><text x="250" y="324" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#2C3E50">(3,1)</text>
      <!-- (4,1) --> <circle cx="320" cy="320" r="5.5" fill="#2C3E50" stroke="white" stroke-width="1.2"/><text x="330" y="324" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#2C3E50">(4,1)</text>
      <!-- (1,2) --> <circle cx="80" cy="240" r="5.5" fill="#2C3E50" stroke="white" stroke-width="1.2"/><text x="90" y="235" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#2C3E50">(1,2)</text>
      <!-- (2,2) --> <circle cx="160" cy="240" r="5.5" fill="#2C3E50" stroke="white" stroke-width="1.2"/><text x="170" y="235" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#2C3E50">(2,2)</text>
      <!-- (3,2) --> <circle cx="240" cy="240" r="5.5" fill="#2C3E50" stroke="white" stroke-width="1.2"/><text x="250" y="235" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#2C3E50">(3,2)</text>
      <!-- (1,3) --> <circle cx="80" cy="160" r="5.5" fill="#2C3E50" stroke="white" stroke-width="1.2"/><text x="90" y="155" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#2C3E50">(1,3)</text>
      <!-- (2,3) --> <circle cx="160" cy="160" r="5.5" fill="#2C3E50" stroke="white" stroke-width="1.2"/><text x="170" y="155" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#2C3E50">(2,3)</text>
      <!-- (1,4) --> <circle cx="80" cy="80" r="5.5" fill="#2C3E50" stroke="white" stroke-width="1.2"/><text x="90" y="75" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#2C3E50">(1,4)</text>
    </g>
  </g>

  <!-- Legend panel -->
  <g transform="translate(510,80)" filter="url(#shadow)">
    <rect x="0" y="0" width="265" height="225" rx="6" fill="white" stroke="#D5D8DC" stroke-width="1"/>
    <rect x="0" y="0" width="265" height="28" rx="6" fill="#2C3E50"/>
    <rect x="0" y="14" width="265" height="14" fill="#2C3E50"/>
    <text x="132" y="19" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-weight="bold" fill="white">Legenda</text>

    <!-- Triangle -->
    <rect x="18" y="40" width="18" height="14" rx="3" fill="#D6EAF8" stroke="#2980B9" stroke-width="1.5"/>
    <text x="45" y="52" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#2C3E50">Sₙ = {(a,b): a+b ≤ n+1}</text>

    <!-- Non-sunny -->
    <line x1="18" y1="78" x2="36" y2="78" stroke="#27AE60" stroke-width="2.4"/>
    <text x="45" y="83" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#2C3E50">Nao-ensolarada (y = cte)</text>

    <!-- Sunny -->
    <line x1="18" y1="108" x2="36" y2="108" stroke="#F39C12" stroke-width="2.2" stroke-dasharray="7,4"/>
    <text x="45" y="113" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#2C3E50">Ensolarada (m ∉ {0,∞,−1})</text>

    <!-- Anti-diagonal -->
    <line x1="18" y1="138" x2="36" y2="138" stroke="#E74C3C" stroke-width="0.7" stroke-dasharray="6,5"/>
    <text x="45" y="143" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#2C3E50">Anti-diagonal (x+y = cte)</text>

    <!-- Point -->
    <circle cx="27" cy="165" r="5.5" fill="#2C3E50" stroke="white" stroke-width="1.2"/>
    <text x="45" y="170" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#2C3E50">Ponto (a,b) ∈ S₄</text>

    <!-- Separator -->
    <line x1="18" y1="188" x2="247" y2="188" stroke="#E5E8E8" stroke-width="0.5"/>

    <text x="132" y="206" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#7F8C8D">|S₄| = 10 pontos • n = 4</text>
    <text x="132" y="220" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#7F8C8D">k_max = ⌊7/3⌋ = 2</text>
  </g>

  <!-- Formula panel -->
  <g transform="translate(510,325)" filter="url(#shadow)">
    <rect x="0" y="0" width="265" height="85" rx="6" fill="white" stroke="#D5D8DC" stroke-width="1"/>
    <rect x="0" y="0" width="265" height="24" rx="6" fill="#2980B9"/>
    <rect x="0" y="12" width="265" height="12" fill="#2980B9"/>
    <text x="132" y="17" text-anchor="middle" font-family="Georgia,serif" font-size="11" font-weight="bold" fill="white">Formula Fundamental</text>
    <text x="132" y="55" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="#2C3E50">k_max = ⌊(2n − 1) / 3⌋</text>
    <text x="132" y="75" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#7F8C8D">Regiao valida: 0 ≤ k ≤ k_max, n ≥ 3</text>
  </g>

  <!-- Footer -->
  <text x="400" y="548" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="8.5" fill="#ABB2B9">Fonte: Elaborado pelo Cora-Debate (P19) — OpenCode Ecosystem v4.2. Dados conforme Graham, Knuth &amp; Patashnik (1994).</text>
</svg>
