  <rect x="245" y="232" width="565" height="1" fill="#7f8c8d" stroke-dasharray="6,4"/>
  <text x="527" y="248" text-anchor="middle" font-size="10" fill="#7f8c8d" font-style="italic">— inserção da camada Cora —</text>

  <line x1="527" y1="255" x2="527" y2="268" stroke="#8e44ad" stroke-width="2" marker-end="url(#arrowCora)"/>

  <!-- Estágio 4 (NOVO - CORA) -->
  <rect x="250" y="270" width="555" height="52" rx="5" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.8" filter="url(#shadowCora)"/>
  <text x="527" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#6c3483">4. VERIFICAÇÃO CIENTÍFICA CORA [NOVO]</text>
  <text x="527" y="310" text-anchor="middle" font-size="10" fill="#7d3c98">4 subespecialistas: Física Teórica · Matemática Pura · Estatística · Computação Científica</text>

