  <circle cx="225" cy="115" r="4" fill="#2e86c1"/>
  <circle cx="225" cy="248" r="4" fill="#2e86c1"/>
  <circle cx="225" cy="362" r="4" fill="#2e86c1"/>

  <!-- ====== PIPELINE MASWOS (9 estágios - coluna central direita) ====== -->

  <!-- Estágio 1 -->
  <rect x="250" y="60" width="555" height="44" rx="5" fill="#d6eaf8" stroke="#2980b9" stroke-width="1" filter="url(#shadow)"/>
  <text x="527" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#154360">1. PESQUISA BIBLIOGRÁFICA</text>
  <text x="527" y="94" text-anchor="middle" font-size="10" fill="#1a5276">SEEKER (arXiv, OpenAlex, PubMed, CORE) + Sci-Hub DOI resolver + websearch DuckDuckGo</text>

  <line x1="527" y1="104" x2="527" y2="118" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Estágio 2 -->
  <rect x="250" y="120" width="555" height="44" rx="5" fill="#d6eaf8" stroke="#2980b9" stroke-width="1" filter="url(#shadow)"/>
  <text x="527" y="138" text-anchor="middle" font-size="12" font-weight="bold" fill="#154360">2. PLANEJAMENTO ESTRUTURAL</text>
  <text x="527" y="154" text-anchor="middle" font-size="10" fill="#1a5276">Sequential Thinking (MCP) + 38 tipos de raciocínio + 10 estratégias de Teoria dos Jogos</text>

  <line x1="527" y1="164" x2="527" y2="178" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Estágio 3 -->
  <rect x="250" y="180" width="555" height="44" rx="5" fill="#d6eaf8" stroke="#2980b9" stroke-width="1" filter="url(#shadow)"/>
  <text x="527" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="#154360">3. REDAÇÃO COLABORATIVA</text>
  <text x="527" y="214" text-anchor="middle" font-size="10" fill="#1a5276">49 agentes MASWOS · debate multiagente (Agent Forum) · IMRAD estruturado</text>

