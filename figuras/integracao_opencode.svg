  <text x="410" y="27" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold" letter-spacing="1">INTEGRAÇÃO CORA ↔ OPENCODE v4.2 — PIPELINE ACADÊMICO MULTIAGENTE</text>

  <!-- ====== ECOSSISTEMA OPENCODE (sidebar esquerda) ====== -->
  <rect x="15" y="60" width="210" height="670" rx="6" fill="#eaf2f8" stroke="#2e86c1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="120" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5276">ECOSSISTEMA OPENCODE</text>
  <line x1="35" y1="92" x2="205" y2="92" stroke="#aed6f1" stroke-width="1"/>

  <text x="120" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#2471a3">Infraestrutura</text>
  <text x="35" y="133" font-size="10" fill="#2c3e50">125 agentes especializados</text>
  <text x="35" y="149" font-size="10" fill="#2c3e50">40 MCPs (busca, execução)</text>
  <text x="35" y="165" font-size="10" fill="#2c3e50">104 skills (12 categorias)</text>
  <text x="35" y="181" font-size="10" fill="#2c3e50">6 camadas (L0–L6)</text>
  <text x="35" y="197" font-size="10" fill="#2c3e50">38 tipos de raciocínio</text>

  <line x1="35" y1="210" x2="205" y2="210" stroke="#aed6f1" stroke-width="0.8"/>
  <text x="120" y="228" text-anchor="middle" font-size="11" font-weight="bold" fill="#2471a3">MCPs Relevantes</text>
  <text x="35" y="246" font-size="10" fill="#555">SEEKER (10+ fontes acad.)</text>
  <text x="35" y="262" font-size="10" fill="#555">Sci-Hub (DOI → PDF)</text>
  <text x="35" y="278" font-size="10" fill="#555">Code Runner (Python)</text>
  <text x="35" y="294" font-size="10" fill="#555">Sequential Thinking</text>
  <text x="35" y="310" font-size="10" fill="#555">Playwright (browser)</text>
  <text x="35" y="326" font-size="10" fill="#555">Memory (grafo de conhecimento)</text>

  <line x1="35" y1="340" x2="205" y2="340" stroke="#aed6f1" stroke-width="0.8"/>
  <text x="120" y="358" text-anchor="middle" font-size="11" font-weight="bold" fill="#2471a3">Skills de Auditoria</text>
  <text x="35" y="376" font-size="10" fill="#555">PhD Auditor (Nash, Cohen)</text>
  <text x="35" y="392" font-size="10" fill="#555">Academic ML Pipeline</text>
  <text x="35" y="408" font-size="10" fill="#555">Agent Forum (debate)</text>
  <text x="35" y="424" font-size="10" fill="#555">DocIR (template engine)</text>

