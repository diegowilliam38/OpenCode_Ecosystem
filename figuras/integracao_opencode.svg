  <text x="398" y="330" text-anchor="middle" font-size="8" fill="#4a235a">Lean 4</text>
  <rect x="436" y="318" width="60" height="16" rx="3" fill="#d2b4de"/>
  <text x="466" y="330" text-anchor="middle" font-size="8" fill="#4a235a">Z3 SMT</text>
  <rect x="504" y="318" width="70" height="16" rx="3" fill="#d2b4de"/>
  <text x="539" y="330" text-anchor="middle" font-size="8" fill="#4a235a">SciPy Boot</text>
  <rect x="582" y="318" width="70" height="16" rx="3" fill="#d2b4de"/>
  <text x="617" y="330" text-anchor="middle" font-size="8" fill="#4a235a">JAX cond</text>
  <rect x="660" y="318" width="70" height="16" rx="3" fill="#d2b4de"/>
  <text x="695" y="330" text-anchor="middle" font-size="8" fill="#4a235a">FEniCS</text>

  <line x1="527" y1="338" x2="527" y2="352" stroke="#8e44ad" stroke-width="2" marker-end="url(#arrowCora)"/>

  <!-- Estágio 5 (NOVO - CORA) -->
  <rect x="250" y="354" width="555" height="52" rx="5" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.8" filter="url(#shadowCora)"/>
  <text x="527" y="374" text-anchor="middle" font-size="12" font-weight="bold" fill="#6c3483">5. REFINAMENTO CORA [NOVO]</text>
  <text x="527" y="394" text-anchor="middle" font-size="10" fill="#7d3c98">LLM recebe relatório de erros (k, τ, δ) → reescreve seções afetadas → T decresce 1.2→0.8</text>

  <!-- Divisor: fim da camada Cora -->
  <rect x="245" y="414" width="565" height="1" fill="#7f8c8d" stroke-dasharray="6,4"/>
  <text x="527" y="430" text-anchor="middle" font-size="10" fill="#7f8c8d" font-style="italic">— retorno ao pipeline convencional —</text>

  <line x1="527" y1="437" x2="527" y2="450" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Estágio 6 -->
  <rect x="250" y="452" width="555" height="44" rx="5" fill="#d6eaf8" stroke="#2980b9" stroke-width="1" filter="url(#shadow)"/>
  <text x="527" y="470" text-anchor="middle" font-size="12" font-weight="bold" fill="#154360">6. REVISÃO POR PARES SIMULADA</text>
  <text x="527" y="486" text-anchor="middle" font-size="10" fill="#1a5276">5 revisores · Nash equilibrium · Cohen's d · Bonferroni correction · IMRAD compliance</text>

  <line x1="527" y1="496" x2="527" y2="510" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Estágio 7 -->
  <rect x="250" y="512" width="555" height="44" rx="5" fill="#d6eaf8" stroke="#2980b9" stroke-width="1" filter="url(#shadow)"/>
  <text x="527" y="530" text-anchor="middle" font-size="12" font-weight="bold" fill="#154360">7. CORREÇÃO MULTIMODAL</text>
  <text x="527" y="546" text-anchor="middle" font-size="10" fill="#1a5276">6 motores: gramática PT-BR · ABNT NBR 10520 · citações DOI · antiplágio · TSAC · corretor CJK</text>

  <line x1="527" y1="556" x2="527" y2="570" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Estágio 8 -->
  <rect x="250" y="572" width="555" height="44" rx="5" fill="#d6eaf8" stroke="#2980b9" stroke-width="1" filter="url(#shadow)"/>
  <text x="527" y="590" text-anchor="middle" font-size="12" font-weight="bold" fill="#154360">8. PONTUAÇÃO QUALIS A1</text>
  <text x="527" y="606" text-anchor="middle" font-size="10" fill="#1a5276">10 critérios · pesos bayesianos · auto-score ≥ 95/100 · validação cruzada Pearson</text>

  <line x1="527" y1="616" x2="527" y2="630" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Estágio 9 -->
  <rect x="250" y="632" width="555" height="44" rx="5" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="527" y="650" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">9. EXPORTAÇÃO FINAL</text>
  <text x="527" y="666" text-anchor="middle" font-size="10" fill="#239b56">LaTeX ABNT · PDF/A archival · trilha de auditoria SHA-256 · DOI references verificados</text>

  <!-- ====== TRILHA DE AUDITORIA (rodapé) ====== -->
  <rect x="15" y="695" width="790" height="45" rx="5" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="410" y="714" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">TRILHA DE AUDITORIA</text>
  <text x="410" y="730" text-anchor="middle" font-size="10" fill="#555">SHA-256 hash chain · DOIs verificáveis (CrossRef/OpenAlex) · Log de verificação Cora imutável · Conformidade LGPD · Reproducibilidade total</text>

  <!-- Conexões da sidebar ao pipeline -->
  <path d="M 226 115 L 245 115 L 245 82 L 250 82" fill="none" stroke="#2e86c1" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 226 248 L 245 248 L 245 142 L 250 142" fill="none" stroke="#2e86c1" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 226 362 L 245 362 L 245 202 L 250 202" fill="none" stroke="#2e86c1" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Fonte -->
  <text x="410" y="748" text-anchor="middle" font-size="9" fill="#999">Fonte: Elaboração própria (2026).</text>
