    <g stroke="#E5E8E8" stroke-width="0.4">
      <line x1="51" y1="0" x2="51" y2="315"/>
      <line x1="102" y1="0" x2="102" y2="315"/>
      <line x1="153" y1="0" x2="153" y2="315"/>
      <line x1="204" y1="0" x2="204" y2="315"/>
      <line x1="255" y1="0" x2="255" y2="315"/>
      <line x1="306" y1="0" x2="306" y2="315"/>
      <line x1="357" y1="0" x2="357" y2="315"/>
      <line x1="408" y1="0" x2="408" y2="315"/>
      <line x1="459" y1="0" x2="459" y2="315"/>
      <line x1="510" y1="0" x2="510" y2="315"/>
      <line x1="0" y1="51" x2="620" y2="51"/>
      <line x1="0" y1="102" x2="620" y2="102"/>
      <line x1="0" y1="153" x2="620" y2="153"/>
      <line x1="0" y1="204" x2="620" y2="204"/>
      <line x1="0" y1="255" x2="620" y2="255"/>
    </g>

    <!-- Axes -->
    <line x1="0" y1="306" x2="620" y2="306" stroke="#2C3E50" stroke-width="1.5"/>
    <line x1="0" y1="306" x2="0" y2="0" stroke="#2C3E50" stroke-width="1.5"/>

    <!-- Axis labels -->
    <text x="310" y="335" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-style="italic" fill="#2C3E50">n (numero de retas)</text>
    <text x="-42" y="153" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-style="italic" fill="#2C3E50" transform="rotate(-90,-42,153)">k_max</text>

    <!-- Y-axis tick labels -->
    <g font-family="Helvetica,Arial,sans-serif" font-size="9.5" fill="#5D6D7E" text-anchor="end">
      <text x="-8" y="310">0</text>
      <text x="-8" y="259">10</text>
      <text x="-8" y="208">20</text>
      <text x="-8" y="157">30</text>
      <text x="-8" y="106">40</text>
      <text x="-8" y="55">50</text>
      <text x="-8" y="4">60</text>
    </g>

    <!-- X-axis tick labels -->
    <g font-family="Helvetica,Arial,sans-serif" font-size="9.5" fill="#5D6D7E" text-anchor="middle">
      <text x="51" y="322">10</text>
      <text x="153" y="322">30</text>
      <text x="255" y="322">50</text>
      <text x="357" y="322">70</text>
      <text x="459" y="322">90</text>
      <line x1="51" y1="306" x2="51" y2="310" stroke="#5D6D7E" stroke-width="0.6"/>
      <line x1="153" y1="306" x2="153" y2="310" stroke="#5D6D7E" stroke-width="0.6"/>
      <line x1="255" y1="306" x2="255" y2="310" stroke="#5D6D7E" stroke-width="0.6"/>
      <line x1="357" y1="306" x2="357" y2="310" stroke="#5D6D7E" stroke-width="0.6"/>
      <line x1="459" y1="306" x2="459" y2="310" stroke="#5D6D7E" stroke-width="0.6"/>
    </g>

    <!-- Valid region (filled area) -->
    <polygon points="15,275 612,72 612,306 15,306" fill="url(#areaFill)"/>

    <!-- k_max curve -->
    <polyline points="
      15,275 20,270 25,265 30,260 35,255 40,250 45,245
      51,240 56,235 61,230 66,225 71,220 76,215 81,210 86,205
      92,200 97,195 102,190 107,185 112,180 117,175 122,170
      127,165 133,160 138,155 143,150 148,145 153,140 158,135
      163,130 168,125 174,120 179,115 184,110 189,105 194,100
      199,95 204,90 210,85 215,80 220,75 225,70 230,65
      235,60 240,55 245,50 251,45 256,40 261,35 266,30
      271,25 276,20 281,15 286,10 292,5 297,0 302,0
      307,0 312,0 317,0 322,0 327,0 332,0 337,0 342,0
      347,0 352,0 357,0 362,0 367,0 372,0 377,0 382,0
      387,0 392,0 397,0 402,0 407,0 412,0 417,0 422,0
      427,0 432,0 437,0 442,0 447,0 452,0 457,0 462,0
      467,0 472,0 477,0 482,0 487,0 492,0 497,0 502,0
      507,0 512,0 517,0 522,0 527,0 532,0 537,0 542,0
      547,0 552,0 557,0 562,0 567,0 572,0 577,0 582,0
      587,0 592,0 597,0 602,0 607,0 612,0
    " fill="none" stroke="#2980B9" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Asymptote k = 2n/3 -->
    <line x1="0" y1="306" x2="459" y2="0" stroke="#95A5A6" stroke-width="0.9" stroke-dasharray="6,5"/>
    <text x="440" y="12" font-family="Helvetica,Arial,sans-serif" font-size="8" fill="#95A5A6">k = 2n/3</text>

    <!-- Selected points -->
    <circle cx="15" cy="275" r="5.5" fill="#E74C3C" stroke="white" stroke-width="1.5"/>
    <text x="18" y="268" font-family="Helvetica,Arial,sans-serif" font-size="8.5" fill="#E74C3C" font-weight="bold">n=3, k=1</text>

    <circle cx="35" cy="255" r="4" fill="#2C3E50"/>
    <text x="38" y="250" font-family="Helvetica,Arial,sans-serif" font-size="7.5" fill="#5D6D7E">n=5,k=3</text>

    <circle cx="66" cy="225" r="5" fill="#27AE60" stroke="white" stroke-width="1.5"/>
    <text x="69" y="218" font-family="Helvetica,Arial,sans-serif" font-size="8.5" fill="#27AE60" font-weight="bold">n=10,k=6</text>

    <circle cx="255" cy="153" r="5" fill="#F39C12" stroke="white" stroke-width="1.5"/>
    <text x="258" y="146" font-family="Helvetica,Arial,sans-serif" font-size="8.5" fill="#E67E22" font-weight="bold">n=50,k=33</text>

    <circle cx="510" cy="0" r="5.5" fill="#8E44AD" stroke="white" stroke-width="1.5"/>
    <text x="513" y="-8" font-family="Helvetica,Arial,sans-serif" font-size="8.5" fill="#8E44AD" font-weight="bold">n=100,k=66</text>
  </g>

  <!-- Data table panel -->
  <g transform="translate(600,58)" filter="url(#sh2)">
    <rect x="0" y="0" width="165" height="175" rx="6" fill="white" stroke="#D5D8DC" stroke-width="1"/>
    <rect x="0" y="0" width="165" height="24" rx="6" fill="#2C3E50"/>
    <rect x="0" y="12" width="165" height="12" fill="#2C3E50"/>
    <text x="82" y="17" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-weight="bold" fill="white">Dados da Simulacao</text>

    <g font-family="Helvetica,Arial,sans-serif" font-size="8.5" fill="#2C3E50">
      <text x="10" y="42">n      k_max    |S_n|</text>
      <line x1="10" y1="47" x2="155" y2="47" stroke="#E5E8E8" stroke-width="0.4"/>
      <text x="10" y="64">3       1       6</text>
      <text x="10" y="80">4       2       10</text>
      <text x="10" y="96">5       3       15</text>
      <text x="10" y="112">10      6       55</text>
      <text x="10" y="128">50     33      1275</text>
      <text x="10" y="144">100    66      5050</text>
      <text x="10" y="168">|S_n| = n(n+1)/2</text>
    </g>
  </g>

  <!-- Formula box -->
  <g transform="translate(600,250)" filter="url(#sh2)">
    <rect x="0" y="0" width="165" height="65" rx="6" fill="#EBF5FB" stroke="#2980B9" stroke-width="1.2"/>
    <text x="82" y="22" text-anchor="middle" font-family="Georgia,serif" font-size="11" font-weight="bold" fill="#1A5276">Formula</text>
    <text x="82" y="44" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="bold" fill="#1A5276">k_max = ⌊(2n−1)/3⌋</text>
    <text x="82" y="60" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="8" fill="#7F8C8D">Area sombreada: 0 ≤ k ≤ k_max</text>
  </g>

  <!-- Footer -->
  <text x="390" y="472" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="8.5" fill="#ABB2B9">Fonte: Simulacao Cora-Debate (verify_olympiad.py). Calculo exato para n = 3..100. Regiao valida verificada por V1-V5.</text>
</svg>
