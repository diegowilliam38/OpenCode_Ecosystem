<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" width="780" height="480">
  <defs>
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2980B9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2980B9" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="sh2" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0.3" dy="0.5" stdDeviation="1.2" flood-color="#1A252F" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="780" height="480" fill="#FAFCFF" rx="8"/>

  <text x="390" y="30" text-anchor="middle" font-family="Georgia,serif" font-size="17" font-weight="bold" fill="#1A252F">Figura 3: k_max = f(n) — Numero Maximo de Retas Ensolaradas</text>
  <line x1="200" y1="38" x2="580" y2="38" stroke="#2980B9" stroke-width="1.5" opacity="0.4"/>

  <!-- Graph area -->
  <g transform="translate(80,55)">
