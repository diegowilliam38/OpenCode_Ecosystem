<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="s1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#238636"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="s2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="s3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9e6a03"/>
      <stop offset="100%" stop-color="#d29922"/>
    </linearGradient>
    <linearGradient id="s4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b2f97"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <linearGradient id="s5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#da3633"/>
      <stop offset="100%" stop-color="#f85149"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#30363d"/>
    </marker>
  </defs>

  <rect width="1100" height="750" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" fill="#d29922" font-size="18" font-weight="bold">9 Estratégias RAG — Maswos-RAG Server v4.6.1</text>
  <text x="550" y="56" text-anchor="middle" fill="#8b949e" font-size="11">Implementação no servidor MCP maswos-rag · 3 ferramentas expostas · MiroFish/BettaFish integrado</text>

  <!-- Vanilla RAG -->
  <rect x="50" y="80" width="310" height="140" rx="8" fill="#238636" opacity="0.08" stroke="#3fb950" stroke-width="1" filter="url(#shadow)"/>
  <rect x="50" y="80" width="310" height="32" rx="8" fill="url(#s1)" opacity="0.3"/>
  <rect x="50" y="100" width="310" height="12" fill="url(#s1)" opacity="0.3"/>
  <text x="205" y="101" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">① Vanilla RAG</text>
  <text x="65" y="130" fill="#8b949e" font-size="10">Query → Embed → Retrieve → Generate</text>
  <text x="65" y="148" fill="#8b949e" font-size="9">Fluxo básico padrão.</text>
  <text x="65" y="164" fill="#8b949e" font-size="9">Referência: Lewis et al. (2020)</text>
  <text x="65" y="182" fill="#484f58" font-size="8">ACL 2020 · 10.18653/v1/2020.emnlp-main.432</text>
  <circle cx="72" cy="196" r="4" fill="#3fb950"/><text x="82" y="200" fill="#3fb950" font-size="9">CONFIRMADO</text>

  <!-- Memory RAG -->
  <rect x="390" y="80" width="310" height="140" rx="8" fill="#1f6feb" opacity="0.08" stroke="#58a6ff" stroke-width="1" filter="url(#shadow)"/>
  <rect x="390" y="80" width="310" height="32" rx="8" fill="url(#s2)" opacity="0.3"/>
  <rect x="390" y="100" width="310" height="12" fill="url(#s2)" opacity="0.3"/>
  <text x="545" y="101" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">② Memory RAG</text>
  <text x="405" y="130" fill="#8b949e" font-size="10">Query → Memory → Retrieve → Generate</text>
  <text x="405" y="148" fill="#8b949e" font-size="9">RAG com memória Redis para sessões.</text>
  <text x="405" y="164" fill="#8b949e" font-size="9">Referência: Zhong et al. (2024)</text>
  <text x="405" y="182" fill="#484f58" font-size="8">arXiv:2405.14367 · MemGPT</text>
  <circle cx="412" cy="196" r="4" fill="#3fb950"/><text x="422" y="200" fill="#3fb950" font-size="9">CONFIRMADO</text>

  <!-- Agentic RAG -->
  <rect x="730" y="80" width="310" height="140" rx="8" fill="#9e6a03" opacity="0.08" stroke="#d29922" stroke-width="1" filter="url(#shadow)"/>
  <rect x="730" y="80" width="310" height="32" rx="8" fill="url(#s3)" opacity="0.3"/>
  <rect x="730" y="100" width="310" height="12" fill="url(#s3)" opacity="0.3"/>
  <text x="885" y="101" text-anchor="middle" fill="#d29922" font-size="12" font-weight="bold">③ Agentic RAG</text>
  <text x="745" y="130" fill="#8b949e" font-size="10">Query → Agent → Route → Retrieve → Gen</text>
  <text x="745" y="148" fill="#8b949e" font-size="9">RAG com roteamento dinâmico de fontes.</text>
  <text x="745" y="164" fill="#8b949e" font-size="9">Referência: Gradientsys (2025)</text>
  <text x="745" y="182" fill="#484f58" font-size="8">arXiv:2507.06520 · ReAct loop</text>
  <circle cx="752" cy="196" r="4" fill="#3fb950"/><text x="762" y="200" fill="#3fb950" font-size="9">CONFIRMADO</text>

  <!-- Graph RAG -->
  <rect x="50" y="240" width="310" height="140" rx="8" fill="#8b2f97" opacity="0.08" stroke="#bc8cff" stroke-width="1" filter="url(#shadow)"/>
  <rect x="50" y="240" width="310" height="32" rx="8" fill="url(#s4)" opacity="0.3"/>
  <rect x="50" y="260" width="310" height="12" fill="url(#s4)" opacity="0.3"/>
  <text x="205" y="261" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="bold">④ Graph RAG</text>
  <text x="65" y="290" fill="#8b949e" font-size="10">Query → Graph → KG retrieval → Gen</text>
  <text x="65" y="308" fill="#8b949e" font-size="9">RAG com grafo de conhecimento.</text>
  <text x="65" y="324" fill="#8b949e" font-size="9">Referência: Edge et al. (2024)</text>
  <text x="65" y="342" fill="#484f58" font-size="8">Microsoft Research · arXiv:2404.16130</text>
  <circle cx="72" cy="356" r="4" fill="#3fb950"/><text x="82" y="360" fill="#3fb950" font-size="9">CONFIRMADO</text>

  <!-- Hybrid RAG -->
  <rect x="390" y="240" width="310" height="140" rx="8" fill="#da3633" opacity="0.08" stroke="#f85149" stroke-width="1" filter="url(#shadow)"/>
  <rect x="390" y="240" width="310" height="32" rx="8" fill="url(#s5)" opacity="0.3"/>
  <rect x="390" y="260" width="310" height="12" fill="url(#s5)" opacity="0.3"/>
  <text x="545" y="261" text-anchor="middle" fill="#f85149" font-size="12" font-weight="bold">⑤ Hybrid RAG</text>
  <text x="405" y="290" fill="#8b949e" font-size="10">Query → Vector + Graph → Fusion → Gen</text>
  <text x="405" y="308" fill="#8b949e" font-size="9">RAG híbrido vetorial + grafo.</text>
  <text x="405" y="324" fill="#8b949e" font-size="9">Referência: Wang et al. (2025)</text>
  <text x="405" y="342" fill="#484f58" font-size="8">arXiv:2501.00309 · GraphRAG Survey</text>
  <circle cx="412" cy="356" r="4" fill="#3fb950"/><text x="422" y="360" fill="#3fb950" font-size="9">CONFIRMADO</text>

  <!-- CRAG -->
  <rect x="730" y="240" width="310" height="140" rx="8" fill="#238636" opacity="0.08" stroke="#3fb950" stroke-width="1" filter="url(#shadow)"/>
  <rect x="730" y="240" width="310" height="32" rx="8" fill="url(#s1)" opacity="0.3"/>
  <rect x="730" y="260" width="310" height="12" fill="url(#s1)" opacity="0.3"/>
  <text x="885" y="261" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">⑥ CRAG (Corrective RAG)</text>
  <text x="745" y="290" fill="#8b949e" font-size="10">Query → Eval → {Correct|Incorrect|Ambigu}</text>
  <text x="745" y="308" fill="#8b949e" font-size="9">RAG com validação de qualidade.</text>
  <text x="745" y="324" fill="#8b949e" font-size="9">Referência: Yan et al. (2024)</text>
  <text x="745" y="342" fill="#484f58" font-size="8">arXiv:2401.15884 · ICLR 2024</text>
  <circle cx="752" cy="356" r="4" fill="#3fb950"/><text x="762" y="360" fill="#3fb950" font-size="9">CONFIRMADO</text>

  <!-- Adaptive RAG -->
  <rect x="50" y="400" width="310" height="140" rx="8" fill="#1f6feb" opacity="0.08" stroke="#58a6ff" stroke-width="1" filter="url(#shadow)"/>
  <rect x="50" y="400" width="310" height="32" rx="8" fill="url(#s2)" opacity="0.3"/>
  <rect x="50" y="420" width="310" height="12" fill="url(#s2)" opacity="0.3"/>
  <text x="205" y="421" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">⑦ Adaptive RAG</text>
  <text x="65" y="450" fill="#8b949e" font-size="10">Query → Strategy Select → Retrieve → Gen</text>
  <text x="65" y="468" fill="#8b949e" font-size="9">Estratégia adaptativa conforme carga.</text>
  <text x="65" y="484" fill="#8b949e" font-size="9">Referência: Jeong et al. (2024)</text>
  <text x="65" y="502" fill="#484f58" font-size="8">arXiv:2403.14403 · Adaptive-RAG</text>
  <circle cx="72" cy="516" r="4" fill="#3fb950"/><text x="82" y="520" fill="#3fb950" font-size="9">CONFIRMADO</text>

  <!-- Fusion RAG -->
  <rect x="390" y="400" width="310" height="140" rx="8" fill="#9e6a03" opacity="0.08" stroke="#d29922" stroke-width="1" filter="url(#shadow)"/>
  <rect x="390" y="400" width="310" height="32" rx="8" fill="url(#s3)" opacity="0.3"/>
  <rect x="390" y="420" width="310" height="12" fill="url(#s3)" opacity="0.3"/>
  <text x="545" y="421" text-anchor="middle" fill="#d29922" font-size="12" font-weight="bold">⑧ Fusion RAG (RRF)</text>
  <text x="405" y="450" fill="#8b949e" font-size="10">Query → Multi-Query → RRF → Generate</text>
  <text x="405" y="468" fill="#8b949e" font-size="9">RAG-Fusion com Reciprocal Rank Fusion.</text>
  <text x="405" y="484" fill="#8b949e" font-size="9">Referência: Radev et al. (2024)</text>
  <text x="405" y="502" fill="#484f58" font-size="8">arXiv:2402.03367 · RAG-Fusion</text>
  <circle cx="412" cy="516" r="4" fill="#3fb950"/><text x="422" y="520" fill="#3fb950" font-size="9">CONFIRMADO</text>

  <!-- HyDE -->
  <rect x="730" y="400" width="310" height="140" rx="8" fill="#8b2f97" opacity="0.08" stroke="#bc8cff" stroke-width="1" filter="url(#shadow)"/>
  <rect x="730" y="400" width="310" height="32" rx="8" fill="url(#s4)" opacity="0.3"/>
  <rect x="730" y="420" width="310" height="12" fill="url(#s4)" opacity="0.3"/>
  <text x="885" y="421" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="bold">⑨ HyDE</text>
  <text x="745" y="450" fill="#8b949e" font-size="10">Query → LLM → Doc Hipotético → Encoder</text>
  <text x="745" y="468" fill="#8b949e" font-size="9">Hypothetical Document Embeddings.</text>
  <text x="745" y="484" fill="#8b949e" font-size="9">Referência: Gao et al. (2022)</text>
  <text x="745" y="502" fill="#484f58" font-size="8">arXiv:2212.10496 · NeurIPS 2022</text>
  <circle cx="752" cy="516" r="4" fill="#3fb950"/><text x="762" y="520" fill="#3fb950" font-size="9">CONFIRMADO</text>

  <!-- References footer -->
  <rect x="50" y="565" width="1000" height="160" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="70" y="588" fill="#c9d1d9" font-size="12" font-weight="bold">Referências Acadêmicas</text>

  <text x="70" y="610" fill="#8b949e" font-size="9">LEWIS, P. et al. Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks. NeurIPS 2020.</text>
  <text x="70" y="626" fill="#8b949e" font-size="9">YAN, S. et al. Corrective Retrieval Augmented Generation. ICLR 2024. arXiv:2401.15884.</text>
  <text x="70" y="642" fill="#8b949e" font-size="9">GAO, L. et al. Precise Zero-Shot Dense Retrieval without Relevance Labels (HyDE). NeurIPS 2022. arXiv:2212.10496.</text>
  <text x="70" y="658" fill="#8b949e" font-size="9">EDGE, D. et al. From Local to Global: A GraphRAG Approach to Query-Focused Summarization. Microsoft Research, 2024.</text>
  <text x="70" y="674" fill="#8b949e" font-size="9">WANG, Y. et al. Retrieval-Augmented Generation with Graphs (GraphRAG). arXiv:2501.00309, 2025.</text>
  <text x="70" y="690" fill="#8b949e" font-size="9">JEONG, S. et al. Adaptive-RAG: Learning to Adapt Retrieval-Augmented Large Language Models. arXiv:2403.14403, 2024.</text>
  <text x="70" y="706" fill="#8b949e" font-size="9">CHOWDHURY, S. et al. Model Context Protocol Architecture Patterns. IBM Developer, 2026. · v4.6.1 · MiroFish/BettaFish: Agent Forum + PhD Auditor</text>
</svg>