<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#238636"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8250df"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d29922"/>
      <stop offset="100%" stop-color="#e3b341"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#da3633"/>
      <stop offset="100%" stop-color="#f85149"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="url(#bg)"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="bold">OpenCode Ecosystem — Engenharia de Software</text>
  <text x="550" y="62" text-anchor="middle" fill="#8b949e" font-size="12">SDD + TDD + CI/CD + SWEBOK + Git Safety + ADR</text>

  <!-- ===== SDD Layer ===== -->
  <rect x="30" y="80" width="320" height="200" rx="10" fill="#161b22" stroke="#238636" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="80" width="320" height="32" rx="10" fill="url(#green)"/>
  <text x="190" y="101" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">SDD — Spec-Driven Development</text>

  <text x="50" y="130" fill="#7ee787" font-size="11" font-weight="bold">SPEC → REVIEW → SKILL → TEST → REGISTER → CI</text>
  <text x="50" y="150" fill="#8b949e" font-size="10">5 dimensões: Comportamento, Usuários,</text>
  <text x="50" y="166" fill="#8b949e" font-size="10">Restrições, Casos de Borda, Critérios</text>
  <text x="50" y="186" fill="#8b949e" font-size="10">186/186 componentes documentados (100%)</text>
  <text x="50" y="208" fill="#8b949e" font-size="10">26 arquivos de spec em 7 categorias</text>
  <rect x="50" y="222" width="280" height="18" rx="4" fill="#0d1117" stroke="#2ea043" stroke-width="1"/>
  <rect x="50" y="222" width="280" height="18" rx="4" fill="#2ea043" opacity="0.3"/>
  <text x="190" y="235" text-anchor="middle" fill="#7ee787" font-size="9">COBERTURA: 100% ✅</text>

  <!-- ===== TDD Layer ===== -->
  <rect x="390" y="80" width="320" height="200" rx="10" fill="#161b22" stroke="#1f6feb" stroke-width="2" filter="url(#shadow)"/>
  <rect x="390" y="80" width="320" height="32" rx="10" fill="url(#blue)"/>
  <text x="550" y="101" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">TDD — Test-Driven Development</text>

  <text x="410" y="130" fill="#79c0ff" font-size="11" font-weight="bold">Pirâmide de Testes</text>
  <text x="410" y="150" fill="#8b949e" font-size="10">╱ E2E ╲ — 3 cenários críticos</text>
  <text x="410" y="166" fill="#8b949e" font-size="10">╱ Integração ╲ — 10 cenários cross-comp</text>
  <text x="410" y="182" fill="#8b949e" font-size="10">╱ Unitários ╲ — 100+ testes</text>
  <text x="410" y="204" fill="#8b949e" font-size="10">Teste = contrato executável da spec</text>
  <text x="410" y="224" fill="#8b949e" font-size="10">Red → Green → Refactor + Agente IA</text>
  <rect x="410" y="242" width="280" height="18" rx="4" fill="#0d1117" stroke="#388bfd" stroke-width="1"/>
  <rect x="410" y="242" width="280" height="18" rx="4" fill="#388bfd" opacity="0.3"/>
  <text x="550" y="255" text-anchor="middle" fill="#79c0ff" font-size="9">10 CENÁRIOS DE INTEGRAÇÃO ✅</text>

  <!-- ===== CI/CD Layer ===== -->
  <rect x="750" y="80" width="320" height="200" rx="10" fill="#161b22" stroke="#8250df" stroke-width="2" filter="url(#shadow)"/>
  <rect x="750" y="80" width="320" height="32" rx="10" fill="url(#purple)"/>
  <text x="910" y="101" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">CI/CD — Pipeline Automatizado</text>

  <text x="770" y="130" fill="#d2a8ff" font-size="11" font-weight="bold">5 Gates Sequenciais</text>
  <text x="770" y="152" fill="#8b949e" font-size="10">1. Lint Gate (ruff + eslint)</text>
  <text x="770" y="170" fill="#8b949e" font-size="10">2. Unit Test Gate (pytest)</text>
  <text x="770" y="188" fill="#8b949e" font-size="10">3. Spec Coverage Gate (≥80%)</text>
  <text x="770" y="206" fill="#8b949e" font-size="10">4. Integration Gate (10 cenários)</text>
  <text x="770" y="224" fill="#8b949e" font-size="10">5. Health Check Gate (auto)</text>
  <rect x="770" y="242" width="280" height="18" rx="4" fill="#0d1117" stroke="#a371f7" stroke-width="1"/>
  <rect x="770" y="242" width="280" height="18" rx="4" fill="#a371f7" opacity="0.3"/>
  <text x="910" y="255" text-anchor="middle" fill="#d2a8ff" font-size="9">GITHUB ACTIONS ✅</text>

  <!-- ===== Arrows between top layers ===== -->
  <line x1="350" y1="180" x2="390" y2="180" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="710" y1="180" x2="750" y2="180" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ===== SWEBOK + Git Safety Row ===== -->
  <rect x="30" y="310" width="500" height="170" rx="10" fill="#161b22" stroke="#d29922" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="310" width="500" height="32" rx="10" fill="url(#orange)"/>
  <text x="280" y="331" text-anchor="middle" fill="#0d1117" font-size="14" font-weight="bold">Manutenção (SWEBOK) + Git Safety</text>

  <text x="50" y="358" fill="#e3b341" font-size="10" font-weight="bold">SWEBOK Categories:</text>
  <text x="50" y="374" fill="#8b949e" font-size="10">Evolutiva 50% | Adaptativa 25% | Corretiva 21% | Preventiva 4%</text>
  <text x="50" y="395" fill="#8b949e" font-size="10">186 componentes classificados no registry</text>
  <text x="50" y="416" fill="#e3b341" font-size="10" font-weight="bold">Git Safety Protocol:</text>
  <text x="50" y="432" fill="#8b949e" font-size="10">COMMIT checkpoint → WORKTREE isolate → AGENT action → REVIEW diff → DECIDE merge/revert</text>
  <text x="50" y="453" fill="#8b949e" font-size="10">Worktree isolation para experimentos arriscados. Branches com convenção semântica.</text>

  <!-- ===== ADR + Architecture Row ===== -->
  <rect x="570" y="310" width="500" height="170" rx="10" fill="#161b22" stroke="#da3633" stroke-width="2" filter="url(#shadow)"/>
  <rect x="570" y="310" width="500" height="32" rx="10" fill="url(#red)"/>
  <text x="820" y="331" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">ADR + Arquitetura em Camadas</text>

  <text x="590" y="358" fill="#f85149" font-size="10" font-weight="bold">Architecture Decision Records (5):</text>
  <text x="590" y="374" fill="#8b949e" font-size="10">ADR-001 Token Budget | ADR-002 3 Camadas</text>
  <text x="590" y="390" fill="#8b949e" font-size="10">ADR-006 Spec-First | ADR-007 CI Pipeline</text>
  <text x="590" y="406" fill="#8b949e" font-size="10">ADR-008 Component Registry SWEBOK</text>
  <text x="590" y="427" fill="#f85149" font-size="10" font-weight="bold">3-Layer Architecture:</text>
  <text x="590" y="443" fill="#8b949e" font-size="10">Agentes (125) → Skills (106) → MCPs (41)</text>
  <text x="590" y="459" fill="#8b949e" font-size="10">Dependência unidirecional. Nunca o contrário.</text>

  <!-- ===== Bottom: Component Registry ===== -->
  <rect x="30" y="510" width="1040" height="110" rx="10" fill="#161b22" stroke="#8b949e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="535" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="bold">Component Registry — 186 Entradas com Classificação SWEBOK</text>

  <!-- Component boxes -->
  <rect x="50" y="548" width="150" height="25" rx="4" fill="url(#green)" opacity="0.2" stroke="#238636" stroke-width="1"/>
  <text x="125" y="565" text-anchor="middle" fill="#7ee787" font-size="10">10 Core (Python)</text>

  <rect x="215" y="548" width="150" height="25" rx="4" fill="url(#blue)" opacity="0.2" stroke="#1f6feb" stroke-width="1"/>
  <text x="290" y="565" text-anchor="middle" fill="#79c0ff" font-size="10">48 Skills</text>

  <rect x="380" y="548" width="150" height="25" rx="4" fill="url(#purple)" opacity="0.2" stroke="#8250df" stroke-width="1"/>
  <text x="455" y="565" text-anchor="middle" fill="#d2a8ff" font-size="10">50 Agentes</text>

  <rect x="545" y="548" width="150" height="25" rx="4" fill="url(#orange)" opacity="0.2" stroke="#d29922" stroke-width="1"/>
  <text x="620" y="565" text-anchor="middle" fill="#e3b341" font-size="10">41 MCPs</text>

  <rect x="710" y="548" width="150" height="25" rx="4" fill="url(#red)" opacity="0.2" stroke="#da3633" stroke-width="1"/>
  <text x="785" y="565" text-anchor="middle" fill="#f85149" font-size="10">8 Plugins</text>

  <rect x="875" y="548" width="175" height="25" rx="4" fill="#8b949e" opacity="0.2" stroke="#8b949e" stroke-width="1"/>
  <text x="962" y="565" text-anchor="middle" fill="#8b949e" font-size="10">29 Comandos</text>

  <rect x="50" y="580" width="1000" height="18" rx="4" fill="#0d1117" stroke="#2ea043" stroke-width="1"/>
  <rect x="50" y="580" width="1000" height="18" rx="4" fill="#2ea043" opacity="0.15"/>
  <text x="550" y="593" text-anchor="middle" fill="#7ee787" font-size="10">186/186 COMPONENTES DOCUMENTADOS — 100% COBERTURA DE SPEC — 5 ADRs — 10 CENÁRIOS DE INTEGRAÇÃO — CI PIPELINE 5 GATES</text>

  <!-- Footer -->
  <line x1="30" y1="650" x2="1070" y2="650" stroke="#30363d" stroke-width="0.5"/>
  <text x="35" y="672" fill="#484f58" font-size="10">OpenCode Ecosystem v4.6 — Engenharia de Software com Agentes Inteligentes</text>
  <text x="35" y="688" fill="#484f58" font-size="9">"IA + Processo = Software de Verdade. A IA amplifica o que já existe: se existe método, amplifica qualidade."</text>
  <text x="1065" y="672" text-anchor="end" fill="#484f58" font-size="10">2026-05-27</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b949e"/>
    </marker>
  </defs>
</svg>
